<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" role="img">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffdff1"/>
      <stop offset="100%" stop-color="#f5d0e0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="280" fill="url(#bgGrad)"/>
  <circle cx="50" cy="70" r="12" fill="#f6cb78" opacity="0.35"/>
  <!-- Setting mist bottle (spray) -->
  <rect x="78" y="105" width="28" height="85" rx="4" fill="#fce4f0" stroke="#e8c5d8" stroke-width="1.5"/>
  <ellipse cx="92" cy="105" rx="14" ry="5" fill="#f5d4e3"/>
  <!-- Spray pump -->
  <rect x="82" y="88" width="20" height="20" rx="3" fill="#dcc5d5" stroke="#b8a8b8" stroke-width="1"/>
  <rect x="84" y="83" width="16" height="8" fill="#c8b8c8"/>
  <circle cx="92" cy="98" r="3" fill="#a898a8"/>
  <!-- Mist effect -->
  <circle cx="75" cy="135" r="6" fill="rgba(255,228,236,0.5)"/>
  <circle cx="110" cy="140" r="5" fill="rgba(255,228,236,0.4)"/>
  <circle cx="70" cy="155" r="4" fill="rgba(255,228,236,0.3)"/>
  <!-- Text -->
  <text x="92" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#b85d8f">MIST</text>
</svg>

