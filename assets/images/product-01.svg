<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" role="img">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f2ff"/>
      <stop offset="100%" stop-color="#e7d9f7"/>
    </linearGradient>
    <linearGradient id="serum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb3d9"/>
      <stop offset="50%" stop-color="#ff99cc"/>
      <stop offset="100%" stop-color="#ff80bf"/>
    </linearGradient>
  </defs>
  <rect width="200" height="280" fill="url(#bgGrad)"/>
  <circle cx="140" cy="40" r="18" fill="#f6d27d" opacity="0.3"/>
  <!-- Serum bottle -->
  <rect x="65" y="80" width="70" height="120" rx="6" fill="url(#serum)" stroke="#d4697a" stroke-width="1.5"/>
  <rect x="70" y="75" width="60" height="12" rx="4" fill="#e6a8b8" stroke="#c87790" stroke-width="1"/>
  <circle cx="100" cy="70" r="8" fill="#ffd280" stroke="#d4b050" stroke-width="1"/>
  <!-- Label -->
  <rect x="72" y="110" width="56" height="35" fill="rgba(255,255,255,0.4)"/>
  <text x="100" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#8b3a52">SERUM</text>
  <!-- Shine effect -->
  <ellipse cx="78" cy="95" rx="8" ry="25" fill="white" opacity="0.25"/>
</svg>

