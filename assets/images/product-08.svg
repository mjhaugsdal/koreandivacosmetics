<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" role="img">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe9be"/>
      <stop offset="100%" stop-color="#f5dca8"/>
    </linearGradient>
  </defs>
  <rect width="200" height="280" fill="url(#bgGrad)"/>
  <circle cx="50" cy="70" r="13" fill="#8f65a4" opacity="0.2"/>
  <!-- Highlighter compact -->
  <circle cx="100" cy="120" r="38" fill="#e5d4a1" stroke="#c9b589" stroke-width="1.5"/>
  <circle cx="100" cy="120" r="35" fill="#fde8a8"/>
  <!-- Shimmer/glow effect -->
  <circle cx="90" cy="110" r="12" fill="#fff5d9" opacity="0.6"/>
  <circle cx="110" cy="115" r="10" fill="#fff9e6" opacity="0.5"/>
  <circle cx="100" cy="135" r="8" fill="#ffe8a0" opacity="0.4"/>
  <!-- Label -->
  <circle cx="100" cy="120" r="30" fill="none" stroke="rgba(201, 181, 137, 0.3)" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="100" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#8b6f3d">GLOW</text>
</svg>

